services:
  nginx:
    image: nginx:1.26
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build: ./docker/php
    image: php:8.4-fpm
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini

  myModel01_db:
    image: mysql:8.0.26
    container_name: myModel01_db
    environment:
      MYSQL_ROOT_PASSWORD:  myModel01User
      MYSQL_DATABASE: myModel01_db
      MYSQL_USER: myModel01User
      MYSQL_PASSWORD: myModel01User
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      PMA_HOST: myModel01_db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: myModel01User
    ports:
      - "8080:80"
    depends_on:
      - myModel01_db

volumes:
  db_data: